<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Criar Disciplina Alternativa | MEW</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mew.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .form-container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #1a237e; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #1a237e; }
        .form-group textarea { min-height: 150px; resize: vertical; }
        .btn-submit { background: #1a237e; color: white; padding: 12px 30px; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
        .btn-submit:hover { background: #0d1b6b; }
        .btn-cancel { background: #6c757d; color: white; padding: 12px 30px; border: none; border-radius: 8px; font-size: 1rem; text-decoration: none; display: inline-block; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="mew-container">
        <div class="mew-sidebar">
            <h2><i class="fas fa-crown"></i> MEW Admin</h2>
            <ul>
                <li><a href="/mew/dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="/mew/alunos"><i class="fas fa-users"></i> Alunos</a></li>
                <li><a href="/mew/disciplinas"><i class="fas fa-book"></i> Disciplinas</a></li>
                <li class="active"><a href="/mew/disciplinas-alternativas"><i class="fas fa-chalkboard"></i> Disciplinas Alternativas</a></li>
                <li><a href="/mew/gerenciar-documentos"><i class="fas fa-file-alt"></i> Documentos</a></li>
                <li><a href="/mew/logout"><i class="fas fa-sign-out-alt"></i> Sair</a></li>
            </ul>
        </div>
        <div class="mew-content">
            <div class="mew-header">
                <h1><i class="fas fa-plus-circle"></i> Nova Disciplina Alternativa</h1>
                <a href="/mew/disciplinas-alternativas" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Voltar</a>
            </div>
            <div class="form-container">
                <form method="POST" action="/mew/criar-disciplina-alternativa">
                    <div class="form-group">
                        <label for="nome"><i class="fas fa-book"></i> Nome da Disciplina *</label>
                        <input type="text" id="nome" name="nome" required placeholder="Ex: Direito Penal - Parte Geral">
                    </div>
                    <div class="form-group">
                        <label for="mural"><i class="fas fa-clipboard"></i> Mural / Informações</label>
                        <textarea id="mural" name="mural" placeholder="Informações gerais sobre a disciplina, instruções para os alunos, etc."></textarea>
                    </div>
                    <div style="margin-top: 30px;">
                        <button type="submit" class="btn-submit"><i class="fas fa-save"></i> Criar Disciplina</button>
                        <a href="/mew/disciplinas-alternativas" class="btn-cancel"><i class="fas fa-times"></i> Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
